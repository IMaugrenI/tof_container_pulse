refresh_seconds: 60
cpu_warn_percent: 50
memory_warn_mb: 1024
docker_timeout_seconds: 8

# optional multi-host setup
hosts:
  - name: local
    docker_context: default

container_overrides:
  postgres:
    memory_warn_mb: 2048
  redis:
    memory_warn_mb: 512
  my_busy_worker:
    cpu_warn_percent: 70
