<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="{{REFRESH_SECONDS}}">
</head>
<body>
  <div>
    <h1>{{TITLE}}</h1>
    <p>Host: {{HOSTNAME}} | Generated: {{GENERATED_AT}} | Previous successful update: {{LAST_SUCCESS_AT}} | Refresh: {{REFRESH_SECONDS}}s</p>
    <p>{{SUMMARY}}</p>
    <div>{{MESSAGES}}</div>
    <table border="1" cellpadding="6" cellspacing="0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Severity</th>
          <th>Status</th>
          <th>State</th>
          <th>CPU</th>
          <th>Memory</th>
          <th>Memory %</th>
          <th>Image</th>
          <th>Running For</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        {{ROWS}}
      </tbody>
    </table>
  </div>
</body>
</html>
