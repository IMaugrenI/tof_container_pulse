<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="{{REFRESH_SECONDS}}">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #0f1115; color: #e9edf5; }
    .wrap { max-width: 1280px; margin: 0 auto; }
    .panel { background: #171a21; border: 1px solid #2a3140; border-radius: 16px; padding: 20px; }
    h1 { margin-top: 0; }
    .meta, .messages p { color: #a3acc0; }
    .summary { font-weight: 700; margin: 18px 0; }
    .messages { margin: 16px 0; padding: 12px 14px; border: 1px solid #2a3140; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    thead { position: sticky; top: 0; background: #171a21; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #2a3140; vertical-align: top; }
    th { color: #a3acc0; font-size: 12px; text-transform: uppercase; }
    tr:hover { background: #1c212b; }
    .sev-ok { color: #1f9d55; font-weight: 700; }
    .sev-warn { color: #d4a72c; font-weight: 700; }
    .sev-critical { color: #d1242f; font-weight: 700; }
    .sev-unknown { color: #6b7280; font-weight: 700; }
    code { color: #e9edf5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>{{TITLE}}</h1>
      <p class="meta">Generated: {{GENERATED_AT}} | Previous successful update: {{LAST_SUCCESS_AT}} | Refresh: {{REFRESH_SECONDS}}s</p>
      <p class="summary">{{SUMMARY}}</p>
      <div class="messages">{{MESSAGES}}</div>
      <table>
        <thead>
          <tr>
            <th>Host</th>
            <th>Name</th>
            <th>Severity</th>
            <th>Status</th>
            <th>State</th>
            <th>CPU</th>
            <th>Memory</th>
            <th>Memory %</th>
            <th>Image</th>
            <th>Running For</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
          {{ROWS}}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
